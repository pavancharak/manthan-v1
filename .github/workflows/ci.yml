name: Manthan CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      MANTHAN_PRIVATE_KEY: ${{ secrets.MANTHAN_PRIVATE_KEY }}
      MANTHAN_PUBLIC_KEY: ${{ secrets.MANTHAN_PUBLIC_KEY }}

    steps:
      # --------------------------------------
      # Checkout
      # --------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------------------------
      # Node setup
      # --------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # --------------------------------------
      # Install (deterministic)
      # --------------------------------------
      - name: Install dependencies
        run: npm ci

      # --------------------------------------
      # Protect v1
      # --------------------------------------
      - name: Check v1 immutability
        run: |
          git fetch origin main
          npm run check:v1

      # --------------------------------------
      # 🔒 FULL SYSTEM CHECK (single source)
      # --------------------------------------
      - name: Run Manthan system check
        run: npm run check