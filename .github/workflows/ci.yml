name: Manthan Strict CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      MANTHAN_PRIVATE_KEY: ${{ secrets.MANTHAN_PRIVATE_KEY }}
      MANTHAN_PUBLIC_KEY: ${{ secrets.MANTHAN_PUBLIC_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # --------------------------------------
      # 🔒 Version discipline
      # --------------------------------------
      - name: Check immutable versions
        run: npm run check:immutable

      # --------------------------------------
      # 🔒 Artifact determinism
      # --------------------------------------
      - name: Generate artifacts
        run: npm run generate:artifacts

      - name: Ensure artifacts committed
        run: git diff --exit-code core/artifactRegistry.ts

      # --------------------------------------
      # 🔒 Type safety
      # --------------------------------------
      - name: Type check
        run: npx tsc --noEmit

      # --------------------------------------
      # 🔒 Tests
      # --------------------------------------
      - name: Run tests
        run: npm test

      # --------------------------------------
      # 🔒 Determinism validation
      # --------------------------------------
      - name: Verify decision system
        run: npm run verify

      # --------------------------------------
      # 🔒 Rule coverage enforcement
      # --------------------------------------
      - name: Run simulation
        run: npm run simulate

      # --------------------------------------
      # 🔥 Fail on unused rules (STRICT)
      # --------------------------------------
      - name: Enforce rule usage
        run: |
          if grep -q "UNUSED RULES" simulation/output.log; then
            echo "❌ Unused rules detected"
            exit 1
          fi

      # --------------------------------------
      # 🔥 Audit artifact (optional)
      # --------------------------------------
      - name: Upload simulation report
        uses: actions/upload-artifact@v4
        with:
          name: simulation-report
          path: simulation/output.log