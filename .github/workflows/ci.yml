name: Manthan CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      MANTHAN_PRIVATE_KEY: ${{ secrets.MANTHAN_PRIVATE_KEY }}
      MANTHAN_PUBLIC_KEY: ${{ secrets.MANTHAN_PUBLIC_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check v1 immutability
        run: |
          git fetch origin main
          npm run check:v1

      - name: Type check
        run: npx tsc

      # 🔥 ADD THIS
      - name: Debug env (safe)
        run: |
          echo "$MANTHAN_PRIVATE_KEY" | head -n 2

      - name: Run tests
        run: npm test