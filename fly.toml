app = "manthan-core-v1"
primary_region = "bom"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  NODE_ENV = "production"

[deploy]
  release_command = "npm run build"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "npm start"